<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Memories ❤️</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <audio autoplay loop>
        <source src="music/song.mp3" type="audio/mpeg">
    </audio>

    <section class="memory-header">

        <div class="container text-center">

            <h1 class="memory-title">
                Our Memories ❤️
            </h1>

            <p class="memory-subtitle">
                Every picture tells a beautiful story.
            </p>

            <a href="index.html" class="hero-btn mt-3">
                🏠 Back Home
            </a>

        </div>

    </section>

    <div class="container pb-5">

        <!-- Childhood -->

        <button class="accordion-btn">

            👶 Childhood

            <span>
                My First Hero ❤️
            </span>

        </button>

        <div class="accordion-content">

            <div class="row mt-4">

                <div class="col-md-3 mb-4">
                    <img src="images/dad1.png" class="gallery-img">
                </div>

                <div class="col-md-3 mb-4">
                    <img src="images/dad2.png" class="gallery-img">
                </div>

                <div class="col-md-3 mb-4">
                    <img src="images/dad3.png" class="gallery-img">
                </div>

                <div class="col-md-3 mb-4">
                    <img src="images/dad4.png" class="gallery-img">
                </div>

            </div>

        </div>

        <!-- Growing Up -->

        <button class="accordion-btn">

            🌟 Growing Up

            <span>
                Always Supporting Every Dream ❤️
            </span>

        </button>

        <div class="accordion-content">

            <div class="row mt-4">

                <div class="col-md-4 mb-4">
                    <img src="images/dad5.png" class="gallery-img">
                </div>

                <div class="col-md-4 mb-4">
                    <img src="images/dad6.png" class="gallery-img">
                </div>

                <div class="col-md-4 mb-4">
                    <img src="images/dad8.png" class="gallery-img">
                </div>

            </div>

        </div>

        <!-- Family -->

        <button class="accordion-btn">

            👨‍👩‍👧 Family

            <span>
                Home Is Wherever You Are ❤️
            </span>

        </button>

        <div class="accordion-content">

            <div class="row mt-4">

                <div class="col-md-4 mb-4">
                    <img src="images/dad.png" class="gallery-img">
                </div>

                <div class="col-md-4 mb-4">
                    <img src="images/dad7.png" class="gallery-img">
                </div>

                <div class="col-md-4 mb-4">
                    <img src="images/dad10.png" class="gallery-img">
                </div>

            </div>

        </div>

        <div class="text-center mt-5">

            <a href="messages.html" class="hero-btn">
                Next ➜ Messages 💌
            </a>

        </div>

    </div>

    <script>

        const accordions =
        document.querySelectorAll('.accordion-btn');

        accordions.forEach(btn => {

            btn.addEventListener('click', () => {

                const content =
                btn.nextElementSibling;

                content.classList.toggle('show');

            });

        });

    </script>

</body>

</html>
