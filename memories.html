<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Memories ❤️</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <audio autoplay loop>
        <source src="music/song.mp3" type="audio/mpeg">
    </audio>

    <section class="memory-header">

        <div class="container text-center">

            <h1 class="memory-title">
                Our Memories ❤️
            </h1>

            <p class="memory-subtitle">
                Every picture tells a beautiful story.
            </p>

            <a href="index.html" class="hero-btn mt-3">
                🏠 Back Home
            </a>

        </div>

    </section>

    <div class="container pb-5">

        <!-- Childhood -->

        <div class="accordion-btn">

            <h2>👶 Childhood</h2>

            <p>My First Hero ❤️</p>

        </div>

        <div class="accordion-content">

            <div class="row">

                <div class="col-md-3 mb-4">
                    <img src="images/dad1.png" class="gallery-img">
                </div>

                <div class="col-md-3 mb-4">
                    <img src="images/dad2.png" class="gallery-img">
                </div>

                <div class="col-md-3 mb-4">
                    <img src="images/dad3.png" class="gallery-img">
                </div>

                <div class="col-md-3 mb-4">
                    <img src="images/dad4.png" class="gallery-img">
                </div>

            </div>

        </div>

        <!-- Growing Up -->

        <div class="accordion-btn">

            <h2>🌟 Growing Up</h2>

            <p>Always Supporting Every Dream ❤️</p>

        </div>

        <div class="accordion-content">

            <div class="row">

                <div class="col-md-4 mb-4">
                    <img src="images/dad5.png" class="gallery-img">
                </div>

                <div class="col-md-4 mb-4">
                    <img src="images/dad6.png" class="gallery-img">
                </div>

                <div class="col-md-4 mb-4">
                    <img src="images/dad8.png" class="gallery-img">
                </div>

            </div>

        </div>

        <!-- Family -->

        <div class="accordion-btn">

            <h2>👨‍👩‍👧 Family</h2>

            <p>Home Is Wherever You Are ❤️</p>

        </div>

        <div class="accordion-content">

            <div class="row">

                <div class="col-md-4 mb-4">
                    <img src="images/dad.png" class="gallery-img">
                </div>

                <div class="col-md-4 mb-4">
                    <img src="images/dad7.png" class="gallery-img">
                </div>

                <div class="col-md-4 mb-4">
                    <img src="images/dad10.png" class="gallery-img">
                </div>

            </div>

        </div>

        <div class="text-center mt-5">

            <a href="messages.html" class="hero-btn">
                Next ➜ Messages 💌
            </a>

        </div>

    </div>

    <script>

        const accordions =
        document.querySelectorAll(".accordion-btn");

        accordions.forEach(card => {

            card.addEventListener("click", () => {

                const content =
                card.nextElementSibling;

                if(content.style.display === "block"){

                    content.style.display = "none";

                }

                else{

                    content.style.display = "block";

                }

            });

        });

    </script>

</body>

</html>
